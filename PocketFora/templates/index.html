<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFora</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #333; }
        .header { background: #1a73e8; color: #fff; padding: 18px 24px; font-size: 22px; font-weight: bold; }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        .card h2 { font-size: 16px; color: #666; margin-bottom: 8px; }
        .resumen-grid { display: flex; gap: 12px; flex-wrap: wrap; }
        .resumen-item { flex: 1; min-width: 120px; text-align: center; padding: 12px; background: #f8f9fa; border-radius: 8px; }
        .resumen-item .num { font-size: 28px; font-weight: bold; color: #d93025; }
        .resumen-item .label { font-size: 13px; color: #666; margin-top: 4px; }
        textarea, input, select { width: 100%; padding: 10px 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }
        button:hover { background: #1557b0; }
        .btn-secondary { background: #5f6368; }
        .btn-danger { background: #d93025; }
        .btn-success { background: #188038; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .trans-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .trans-item:last-child { border-bottom: none; }
        .trans-info { flex: 1; }
        .trans-info .comercio { font-weight: 600; }
        .trans-info .meta { font-size: 12px; color: #888; }
        .trans-monto { font-size: 18px; font-weight: bold; color: #d93025; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; background: #e8f0fe; color: #1a73e8; }
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #e8eaed; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 600; }
        .tab.active { background: #fff; border-bottom: 2px solid #1a73e8; }
        .hidden { display: none; }
        .categoria-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        @media (max-width: 600px) { .resumen-item { min-width: 100px; } }
    </style>
</head>
<body>
    <div class="header">💰 PocketFora</div>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="mostrarTab('inicio')">Inicio</div>
            <div class="tab" onclick="mostrarTab('escaner')">Escanear</div>
            <div class="tab" onclick="mostrarTab('historial')">Historial</div>
            <div class="tab" onclick="mostrarTab('reporte')">Reporte</div>
        </div>

        <div id="tab-inicio">
            <div class="card">
                <h2>Resumen del Mes</h2>
                <div class="resumen-grid">
                    <div class="resumen-item"><div class="num" id="r-total">S/ 0.00</div><div class="label">Total gastado</div></div>
                    <div class="resumen-item"><div class="num" id="r-trans">0</div><div class="label">Transacciones</div></div>
                    <div class="resumen-item"><div class="num" id="r-prom">S/ 0.00</div><div class="label">Promedio</div></div>
                </div>
            </div>
            <div class="card">
                <h2>Acciones rápidas</h2>
                <div class="btn-group">
                    <button onclick="mostrarTab('escaner')">📷 Escanear QR</button>
                    <button class="btn-secondary" onclick="mostrarTab('historial')">📋 Historial</button>
                    <button class="btn-secondary" onclick="mostrarTab('reporte')">📊 Reporte</button>
                </div>
            </div>
        </div>

        <div id="tab-escaner" class="hidden">
            <div class="card">
                <h2>📷 Escanear QR</h2>
                <label>Pega el texto del código QR:</label>
                <textarea id="qr-input" rows="6" placeholder="Pega aqui el texto extraido del codigo QR de la factura..."></textarea>
                <button onclick="parsearQR()">🔍 Procesar QR</button>
            </div>
            <div id="resultado-card" class="card hidden">
                <h2>Datos extraídos</h2>
                <div id="resultado-datos"></div>
                <div class="btn-group" style="margin-top:12px">
                    <button class="btn-success" onclick="guardarTransaccion()">✅ Guardar</button>
                    <button class="btn-danger" onclick="limpiarResultado()">🗑️ Descartar</button>
                </div>
            </div>
        </div>

        <div id="tab-historial" class="hidden">
            <div class="card">
                <h2>📋 Historial de Transacciones</h2>
                <div id="lista-historial"></div>
            </div>
        </div>

        <div id="tab-reporte" class="hidden">
            <div class="card">
                <h2>📊 Reporte Mensual</h2>
                <div id="reporte-categorias"></div>
            </div>
        </div>
    </div>

    <script>
        let ultimoParseo = null;

        function mostrarTab(nombre) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
            event.target.classList.add('active');
            document.getElementById('tab-' + nombre).classList.remove('hidden');
            if (nombre === 'inicio') cargarResumen();
            if (nombre === 'historial') cargarHistorial();
            if (nombre === 'reporte') cargarReporte();
        }

        async function cargarResumen() {
            try {
                const r = await fetch('/api/resumen').then(x => x.json());
                document.getElementById('r-total').textContent = 'S/ ' + r.gasto_total.toFixed(2);
                document.getElementById('r-trans').textContent = r.total_transacciones;
                document.getElementById('r-prom').textContent = 'S/ ' + r.promedio_por_transaccion.toFixed(2);
            } catch(e) {}
        }

        async function parsearQR() {
            const texto = document.getElementById('qr-input').value.trim();
            if (!texto) return alert('Pega el texto del QR primero');
            try {
                const r = await fetch('/api/parsear', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({qr_text:texto})}).then(x => x.json());
                ultimoParseo = r;
                const cats = await fetch('/api/categorias').then(x => x.json());
                let html = `
                    <div style="margin:8px 0"><strong>Comercio:</strong> ${r.comercio}</div>
                    <div style="margin:8px 0"><strong>Fecha:</strong> ${r.fecha}</div>
                    <div style="margin:8px 0"><strong>Total:</strong> <span style="font-size:24px;color:#d93025">S/ ${r.total.toFixed(2)}</span></div>
                    <div style="margin:8px 0"><strong>RUC:</strong> ${r.ruc || '-'}</div>
                    <div style="margin:8px 0"><strong>Tipo:</strong> ${r.tipo_documento || '-'}</div>
                    <div style="margin:8px 0"><strong>Serie:</strong> ${r.serie_numero || '-'}</div>
                    <div style="margin:8px 0"><strong>Categoría:</strong>
                        <select id="cat-select">
                            ${cats.map(c => `<option value="${c.id}">${c.icono} ${c.nombre}</option>`).join('')}
                        </select>
                    </div>
                `;
                if (r.productos && r.productos.length) {
                    html += '<div style="margin:8px 0"><strong>Productos:</strong><ul>';
                    r.productos.forEach(p => { html += `<li>${p.descripcion} x${p.cantidad} @ S/ ${p.precio_unitario.toFixed(2)}</li>`; });
                    html += '</ul></div>';
                }
                if (r.detalle) html += `<div style="margin:8px 0"><strong>Detalle:</strong> ${r.detalle}</div>`;
                document.getElementById('resultado-datos').innerHTML = html;
                document.getElementById('resultado-card').classList.remove('hidden');
            } catch(e) { alert('Error al procesar QR'); }
        }

        async function guardarTransaccion() {
            if (!ultimoParseo) return;
            const data = {...ultimoParseo, qr_raw: document.getElementById('qr-input').value, categoria_id: document.getElementById('cat-select').value};
            try {
                const r = await fetch('/api/guardar', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}).then(x => x.json());
                if (r.status === 'ok') {
                    alert('Transacción guardada');
                    document.getElementById('qr-input').value = '';
                    limpiarResultado();
                    cargarResumen();
                }
            } catch(e) { alert('Error al guardar'); }
        }

        function limpiarResultado() { ultimoParseo = null; document.getElementById('resultado-card').classList.add('hidden'); }

        async function cargarHistorial() {
            try {
                const trans = await fetch('/api/transacciones').then(x => x.json());
                const el = document.getElementById('lista-historial');
                if (!trans.length) { el.innerHTML = '<div style="text-align:center;color:#888;padding:20px">No hay transacciones</div>'; return; }
                let html = '';
                trans.forEach(t => {
                    html += `
                        <div class="trans-item">
                            <div class="trans-info">
                                <div class="comercio">${t.categoria_icono || '📁'} ${t.comercio}</div>
                                <div class="meta">${t.fecha} ${t.tipo_documento ? '· '+t.tipo_documento : ''}</div>
                            </div>
                            <div class="trans-monto">S/ ${t.total.toFixed(2)}</div>
                        </div>
                    `;
                });
                el.innerHTML = html;
            } catch(e) {}
        }

        async function cargarReporte() {
            try {
                const r = await fetch('/api/reporte').then(x => x.json());
                const el = document.getElementById('reporte-categorias');
                const total = r.resumen.gasto_total;
                let html = `<div style="margin-bottom:12px">
                    <div style="font-size:14px;color:#666">Total del mes: <span style="font-size:24px;font-weight:bold;color:#d93025">S/ ${total.toFixed(2)}</span></div>
                    <div style="font-size:13px;color:#888">${r.resumen.total_transacciones} transacciones · Promedio S/ ${r.resumen.promedio_por_transaccion.toFixed(2)}</div>
                </div><hr style="margin:12px 0">`;
                r.categorias.forEach(c => {
                    if (c.total_gastado > 0) {
                        const pct = total > 0 ? (c.total_gastado / total * 100) : 0;
                        html += `<div class="categoria-item"><span>${c.icono} ${c.nombre} <span class="badge">${c.cantidad} trans.</span></span><span style="font-weight:bold">S/ ${c.total_gastado.toFixed(2)} (${pct.toFixed(1)}%)</span></div>`;
                    }
                });
                el.innerHTML = html;
            } catch(e) {}
        }

        cargarResumen();
    </script>
</body>
</html>
